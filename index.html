<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CodeCanvas Pro | Live Editor & Preview</title>
  <!-- CodeMirror 6 via CDN (basic setup) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/fullscreen.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/search.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/searchcursor.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/search/jump-to-line.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/dialog/dialog.min.css"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f12;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Monaco', monospace;
      color: #eef2ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* top bar */
    .top-bar {
      background: #1e1e2a;
      padding: 6px 20px;
      border-bottom: 1px solid #2d2d3a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      z-index: 30;
      flex-shrink: 0;
    }
    .left-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .back-btn {
      background: #2a2a36;
      border: none;
      color: #cbd5e6;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    .back-btn:hover {
      background: #3e3e4e;
      color: white;
    }
    .device-group {
      display: flex;
      gap: 8px;
      background: #14141c;
      padding: 4px 12px;
      border-radius: 48px;
      align-items: center;
    }
    .device-btn {
      background: #2c2c34;
      border: none;
      padding: 5px 16px;
      border-radius: 32px;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      color: #b9c3db;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .device-btn.active {
      background: #10b981;
      color: white;
      box-shadow: 0 2px 8px rgba(16,185,129,0.3);
    }
    .toggle-panel-btn {
      background: #2c6eef;
      border: none;
      color: white;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* preview scroll wrapper */
    .preview-scroll-wrapper {
      flex: 1;
      background: #0a0a0c;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      position: relative;
    }
    .preview-container {
      background: white;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      border-radius: 12px;
      transition: all 0.2s ease;
      overflow: hidden;
      flex-shrink: 0;
      resize: both;
      min-width: 320px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: block;
    }

    /* editor panel */
    .editor-panel {
      background: #14141c;
      border-top: 2px solid #2a2a34;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      flex-shrink: 0;
    }
    .editor-panel.collapsed {
      height: 48px !important;
      min-height: 48px !important;
    }
    .panel-drag-handle {
      background: #1e1e28;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2d2d3a;
    }
    .tabs-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      background: #0c0c12;
      padding: 8px 12px;
      gap: 8px;
      border-bottom: 1px solid #282832;
      overflow-x: auto;
    }
    .tab-item {
      background: #20202a;
      padding: 6px 14px;
      border-radius: 32px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab-item.active {
      background: #2c6eef;
      color: white;
    }
    .tab-close {
      background: #3f3f4e;
      border: none;
      color: white;
      border-radius: 40px;
      width: 20px;
      height: 20px;
      font-size: 12px;
      cursor: pointer;
    }
    .add-tab-btn {
      background: #2c6eef;
      border: none;
      padding: 6px 14px;
      border-radius: 32px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .page-selector {
      background: #2a2a36;
      border-radius: 24px;
      padding: 4px 12px;
      font-size: 0.8rem;
      border: none;
      color: white;
      margin-left: auto;
    }

    /* 4-column grid for codemirror cards */
    .editors-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }
    .editor-panel.collapsed .editors-grid,
    .editor-panel.collapsed .tabs-header {
      display: none;
    }
    .editor-card {
      background: #0e0e14;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2b2b36;
      overflow: hidden;
    }
    .editor-header {
      background: #1a1a24;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 5px;
      border-bottom: 1px solid #2c2c38;
    }
    .action-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #2b2b38;
      border: none;
      padding: 4px 8px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      color: #d9e2ff;
    }
    .search-bar {
      background: #0a0a0f;
      padding: 6px 8px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      border-top: 1px solid #2a2a34;
      font-size: 0.7rem;
    }
    .search-bar input {
      background: #1e1e2a;
      border: 1px solid #3a3a4a;
      padding: 4px 8px;
      border-radius: 20px;
      color: white;
      font-size: 0.7rem;
      width: 100px;
    }
    .search-bar button {
      background: #2c6eef;
      border: none;
      padding: 3px 10px;
      border-radius: 16px;
      color: white;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .CodeMirror {
      height: 260px;
      font-size: 12px;
      font-family: 'Fira Code', 'Monaco', monospace;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }
    .CodeMirror-scroll {
      overflow-x: auto !important;
      white-space: pre !important;
    }
    @media (max-width: 1000px) {
      .editors-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 700px) {
      .editors-grid { grid-template-columns: 1fr; }
    }
    button:active { transform: scale(0.96); }
    ::-webkit-scrollbar { width: 6px; background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 8px; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="left-group">
    <button class="back-btn" id="backBtn">← Back to Dashboard</button>
    <div class="device-group">
      <button class="device-btn" data-device="phone">📱 Phone (Auto-fit)</button>
      <button class="device-btn" data-device="tablet">📟 Tablet (Auto-fit)</button>
      <button class="device-btn active" data-device="laptop">💻 Laptop (Auto-fit)</button>
      <button class="device-btn" data-device="desktop">🖥️ Desktop (Auto-fit)</button>
    </div>
  </div>
  <button class="toggle-panel-btn" id="togglePanelBtn">
    <span class="arrow-icon" id="arrowIcon">▼</span>
    <span id="toggleText">Hide Code Panel</span>
  </button>
</div>

<div class="preview-scroll-wrapper" id="previewScrollWrapper">
  <div class="preview-container" id="previewContainer">
    <iframe id="livePreview" title="Live preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
  </div>
</div>

<div class="editor-panel" id="editorPanel">
  <div class="panel-drag-handle" id="panelHandle">
    <span class="collapse-toggle-icon" id="handleIcon">▲</span>
    <span class="panel-title">click to collapse panel</span>
  </div>
  <div class="tabs-header" id="tabsHeader"></div>
  <div class="editors-grid" id="editorsGrid">
    <!-- 4 cards: Base HTML, Page HTML, Global CSS, Global JS -->
  </div>
</div>

<script>
  // ---------- DATA MODEL ----------
  let htmlTabs = [];      
  let activeTabId = null;
  let tabCounter = 1;

  // DOM elements
  let baseEditorInstance, pageEditorInstance, cssEditorInstance, jsEditorInstance;
  let baseTextarea, pageTextarea, cssTextarea, jsTextarea;

  const previewFrame = document.getElementById('livePreview');
  const previewContainer = document.getElementById('previewContainer');
  const tabsHeaderDiv = document.getElementById('tabsHeader');
  const editorPanel = document.getElementById('editorPanel');
  const togglePanelBtn = document.getElementById('togglePanelBtn');
  const arrowIcon = document.getElementById('arrowIcon');
  const toggleTextSpan = document.getElementById('toggleText');
  const panelHandle = document.getElementById('panelHandle');

  // Helper: create a card with search/replace UI and codemirror
  function createEditorCard(title, mode, placeholder, initialValue = "") {
    const card = document.createElement('div');
    card.className = 'editor-card';
    const header = document.createElement('div');
    header.className = 'editor-header';
    header.innerHTML = `<span>${title}</span><div class="action-buttons" id="actions-${mode}"></div>`;
    const cmDiv = document.createElement('div');
    const searchDiv = document.createElement('div');
    searchDiv.className = 'search-bar';
    searchDiv.innerHTML = `
      <span>🔍</span>
      <input type="text" placeholder="Find..." class="find-input">
      <input type="text" placeholder="Replace..." class="replace-input">
      <button class="find-btn">Find</button>
      <button class="replace-btn">Replace</button>
      <button class="replaceall-btn">All</button>
      <button class="undo-btn">↩️ Undo</button>
      <button class="redo-btn">↪️ Redo</button>
    `;
    card.appendChild(header);
    card.appendChild(cmDiv);
    card.appendChild(searchDiv);
    
    // create textarea for codemirror
    const ta = document.createElement('textarea');
    ta.value = initialValue;
    cmDiv.appendChild(ta);
    
    let cmInstance = CodeMirror.fromTextArea(ta, {
      lineNumbers: true,
      mode: mode,
      theme: "dracula",
      lineWrapping: false,   // horizontal scrolling enabled
      scrollbarStyle: "native",
      extraKeys: { "Ctrl-Space": "autocomplete" }
    });
    cmInstance.setSize(null, 240);
    
    // ensure horizontal scroll
    cmInstance.on("refresh", () => {
      cmInstance.setOption("lineWrapping", false);
    });
    
    // attach undo/redo
    const undoBtn = searchDiv.querySelector('.undo-btn');
    const redoBtn = searchDiv.querySelector('.redo-btn');
    undoBtn.onclick = () => cmInstance.undo();
    redoBtn.onclick = () => cmInstance.redo();
    
    // search replace logic
    const findInput = searchDiv.querySelector('.find-input');
    const replaceInput = searchDiv.querySelector('.replace-input');
    const findBtn = searchDiv.querySelector('.find-btn');
    const replaceBtn = searchDiv.querySelector('.replace-btn');
    const replaceAllBtn = searchDiv.querySelector('.replaceall-btn');
    
    findBtn.onclick = () => {
      const query = findInput.value;
      if (!query) return;
      const cursor = cmInstance.getSearchCursor(query, cmInstance.getCursor(), { caseFold: true });
      if (cursor.findNext()) {
        cmInstance.setSelection(cursor.from(), cursor.to());
        cursor.select();
      } else alert("No more matches");
    };
    replaceBtn.onclick = () => {
      const query = findInput.value;
      if (!query) return;
      const cursor = cmInstance.getSearchCursor(query, cmInstance.getCursor(), { caseFold: true });
      if (cursor.findNext()) {
        cursor.replace(replaceInput.value);
      } else alert("Match not found");
    };
    replaceAllBtn.onclick = () => {
      const query = findInput.value;
      if (!query) return;
      let cursor = cmInstance.getSearchCursor(query, { line: 0, ch: 0 }, { caseFold: true });
      let replaced = 0;
      while (cursor.findNext()) {
        cursor.replace(replaceInput.value);
        replaced++;
      }
      alert(`Replaced ${replaced} occurrences`);
    };
    
    return { card, cmInstance, headerActionsDiv: header.querySelector(`#actions-${mode}`) };
  }
  
  // attach default buttons (clear, paste, copy, upload) dynamically
  function attachDefaultActions(cmInstance, actionsDiv, type) {
    const clearBtn = document.createElement('button'); clearBtn.textContent = 'Clear'; clearBtn.className = 'action-btn';
    const pasteBtn = document.createElement('button'); pasteBtn.textContent = 'Paste'; pasteBtn.className = 'action-btn';
    const copyBtn = document.createElement('button'); copyBtn.textContent = 'Copy'; copyBtn.className = 'action-btn';
    const uploadBtn = document.createElement('button'); uploadBtn.textContent = 'Upload'; uploadBtn.className = 'action-btn';
    actionsDiv.append(clearBtn, pasteBtn, copyBtn, uploadBtn);
    
    clearBtn.onclick = () => { cmInstance.setValue(''); cmInstance.refresh(); triggerPreview(); };
    pasteBtn.onclick = async () => { try { const text = await navigator.clipboard.readText(); cmInstance.setValue(text); triggerPreview(); } catch(e) { alert("Clipboard error"); } };
    copyBtn.onclick = () => { navigator.clipboard.writeText(cmInstance.getValue()); alert("Copied!"); };
    uploadBtn.onclick = () => {
      const input = document.createElement('input'); input.type = 'file';
      let accept = ".txt,.html,.css,.js";
      if(type === 'css') accept = ".css";
      if(type === 'js') accept = ".js";
      if(type === 'html' || type === 'basehtml') accept = ".html,.htm,.txt";
      input.accept = accept;
      input.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { cmInstance.setValue(ev.target.result); triggerPreview(); };
        reader.readAsText(file);
      };
      input.click();
    };
  }
  
  // realtime preview builder
  function updatePreview() {
    const baseRaw = baseEditorInstance ? baseEditorInstance.getValue() : '';
    let baseContent = baseRaw.trim() === "" ? "<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'></head><body></body></html>" : baseRaw;
    const activeTab = htmlTabs.find(t => t.id === activeTabId);
    const pageHtml = activeTab ? activeTab.html : "<div style='padding:20px;'>✨ Start coding</div>";
    const globalCss = cssEditorInstance ? cssEditorInstance.getValue() : '';
    const globalJs = jsEditorInstance ? jsEditorInstance.getValue() : '';
    
    let finalDoc = baseContent;
    let tempDiv = document.createElement('div');
    tempDiv.innerHTML = baseContent;
    let bodyTag = tempDiv.querySelector('body');
    if (bodyTag) {
      bodyTag.innerHTML = pageHtml;
      finalDoc = tempDiv.innerHTML;
    } else {
      if (finalDoc.includes('</body>')) {
        finalDoc = finalDoc.replace('</body>', pageHtml + '</body>');
      } else {
        finalDoc = '<body>' + pageHtml + '</body>' + finalDoc;
      }
    }
    // inject css
    if (globalCss.trim()) {
      const styleTag = `<style data-global="true">\n${globalCss}\n</style>`;
      if (finalDoc.toLowerCase().includes('</head>')) finalDoc = finalDoc.replace(/<\/head>/i, styleTag + '\n</head>');
      else if (finalDoc.toLowerCase().includes('<body')) finalDoc = finalDoc.replace(/<body/i, styleTag + '\n<body');
      else finalDoc = styleTag + finalDoc;
    }
    if (globalJs.trim()) {
      const scriptTag = `<script data-global="true">\n${globalJs}\n<\/script>`;
      if (finalDoc.toLowerCase().includes('</body>')) finalDoc = finalDoc.replace(/<\/body>/i, scriptTag + '\n</body>');
      else finalDoc = finalDoc + scriptTag;
    }
    const doc = previewFrame.contentWindow.document;
    doc.open();
    doc.write(finalDoc);
    doc.close();
  }
  
  function triggerPreview() {
    // sync active page html from codemirror if needed
    if (pageEditorInstance && activeTabId) {
      const active = htmlTabs.find(t => t.id === activeTabId);
      if (active) {
        active.html = pageEditorInstance.getValue();
      }
    }
    updatePreview();
  }
  
  // device preview: sets container size but ensures the preview fits within scroll wrapper (no iframe clipping)
  function setPreview(device) {
    let width, height;
    if (device === 'phone') { width = 380; height = 680; }
    else if (device === 'tablet') { width = 768; height = 1024; }
    else if (device === 'laptop') { width = 1280; height = 800; }
    else { width = 1440; height = 900; } // desktop
    previewContainer.style.width = `${width}px`;
    previewContainer.style.height = `${height}px`;
    previewContainer.style.maxWidth = '100%';
    previewContainer.style.maxHeight = '90vh';
    // maintain relative size
    document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.device-btn[data-device="${device}"]`).classList.add('active');
    setTimeout(() => updatePreview(), 30);
  }
  
  // Detect current screen size and set default device (realistic detection)
  function detectAndSetDefaultDevice() {
    const width = window.innerWidth;
    if (width <= 640) setPreview('phone');
    else if (width <= 900) setPreview('tablet');
    else if (width <= 1400) setPreview('laptop');
    else setPreview('desktop');
  }
  
  // Tab Management UI
  function updateTabUI() {
    tabsHeaderDiv.innerHTML = '';
    htmlTabs.forEach(tab => {
      const tabDiv = document.createElement('div');
      tabDiv.className = 'tab-item';
      if (tab.id === activeTabId) tabDiv.classList.add('active');
      tabDiv.innerHTML = `<span>${escapeHtml(tab.name)}</span><button class="tab-close" data-id="${tab.id}">✕</button>`;
      tabDiv.addEventListener('click', (e) => { if (!e.target.classList.contains('tab-close')) switchTab(tab.id); });
      const closeBtn = tabDiv.querySelector('.tab-close');
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); removeHtmlTab(tab.id); });
      tabsHeaderDiv.appendChild(tabDiv);
    });
    const addBtn = document.createElement('button'); addBtn.textContent = '+ New Page'; addBtn.className = 'add-tab-btn';
    addBtn.onclick = () => addHtmlTab();
    tabsHeaderDiv.appendChild(addBtn);
    
    const selector = document.createElement('select'); selector.className = 'page-selector';
    htmlTabs.forEach(tab => {
      const opt = document.createElement('option'); opt.value = tab.id; opt.textContent = tab.name;
      if (tab.id === activeTabId) opt.selected = true;
      selector.appendChild(opt);
    });
    selector.addEventListener('change', (e) => switchTab(parseInt(e.target.value)));
    tabsHeaderDiv.appendChild(selector);
    
    const active = htmlTabs.find(t => t.id === activeTabId);
    if (active && pageEditorInstance) {
      if (pageEditorInstance.getValue() !== active.html) pageEditorInstance.setValue(active.html);
    }
  }
  
  function switchTab(id) {
    activeTabId = id;
    const active = htmlTabs.find(t => t.id === id);
    if (active && pageEditorInstance) {
      pageEditorInstance.setValue(active.html);
    }
    updateTabUI();
    triggerPreview();
  }
  
  function addHtmlTab() {
    const newId = ++tabCounter;
    const newName = `page_${newId}`;
    const newHtml = `<div style="padding:20px; font-family:system-ui;"><h2>✨ New page: ${newName}</h2><p>Edit content dynamically.</p><div style="margin-top: 60px; background:#eef2ff; padding:20px;">Scroll to see full preview capability</div></div>`;
    htmlTabs.push({ id: newId, name: newName, html: newHtml });
    activeTabId = newId;
    if (pageEditorInstance) pageEditorInstance.setValue(newHtml);
    updateTabUI();
    triggerPreview();
  }
  
  function removeHtmlTab(tabId) {
    if (htmlTabs.length <= 1) { alert("Keep at least one page"); return; }
    const index = htmlTabs.findIndex(t => t.id === tabId);
    if (index !== -1) htmlTabs.splice(index, 1);
    if (activeTabId === tabId) activeTabId = htmlTabs[0]?.id || null;
    const newActive = htmlTabs.find(t => t.id === activeTabId);
    if (newActive && pageEditorInstance) pageEditorInstance.setValue(newActive.html);
    updateTabUI();
    triggerPreview();
  }
  
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  // Build editors grid dynamically
  function buildEditors() {
    const grid = document.getElementById('editorsGrid');
    grid.innerHTML = '';
    // 1) Base HTML
    const baseCard = createEditorCard('📄 Base HTML (Wrapper)', 'htmlmixed', 'Base HTML');
    grid.appendChild(baseCard.card);
    baseEditorInstance = baseCard.cmInstance;
    attachDefaultActions(baseEditorInstance, baseCard.headerActionsDiv, 'basehtml');
    baseEditorInstance.on('change', () => triggerPreview());
    
    // 2) Page HTML (active tab)
    const pageCard = createEditorCard('📑 Page HTML (active tab)', 'htmlmixed', 'Page HTML');
    grid.appendChild(pageCard.card);
    pageEditorInstance = pageCard.cmInstance;
    attachDefaultActions(pageEditorInstance, pageCard.headerActionsDiv, 'html');
    // additional distinguish/merge buttons
    const distinguishBtn = document.createElement('button'); distinguishBtn.textContent = '✨ Distinguish'; distinguishBtn.className = 'action-btn';
    const mergeBtn = document.createElement('button'); mergeBtn.textContent = '🔄 Merge'; mergeBtn.className = 'action-btn';
    pageCard.headerActionsDiv.append(distinguishBtn, mergeBtn);
    distinguishBtn.onclick = () => distinguishCode();
    mergeBtn.onclick = () => mergeCode();
    pageEditorInstance.on('change', () => {
      const active = htmlTabs.find(t => t.id === activeTabId);
      if (active) { active.html = pageEditorInstance.getValue(); triggerPreview(); updateTabUI(); }
    });
    
    // 3) Global CSS
    const cssCard = createEditorCard('🎨 Global CSS', 'css', 'CSS');
    grid.appendChild(cssCard.card);
    cssEditorInstance = cssCard.cmInstance;
    attachDefaultActions(cssEditorInstance, cssCard.headerActionsDiv, 'css');
    cssEditorInstance.on('change', () => triggerPreview());
    
    // 4) Global JS
    const jsCard = createEditorCard('⚡ Global JavaScript', 'javascript', 'JS');
    grid.appendChild(jsCard.card);
    jsEditorInstance = jsCard.cmInstance;
    attachDefaultActions(jsEditorInstance, jsCard.headerActionsDiv, 'js');
    jsEditorInstance.on('change', () => triggerPreview());
  }
  
  // distinguish: extract style/script from active page HTML
  function distinguishCode() {
    const active = htmlTabs.find(t => t.id === activeTabId);
    if (!active) return;
    let htmlCode = active.html;
    const styleRegex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
    const scriptRegex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
    let extractedCss = '', extractedJs = '';
    htmlCode = htmlCode.replace(styleRegex, (match, p1) => { extractedCss += p1 + '\n'; return ''; });
    htmlCode = htmlCode.replace(scriptRegex, (match, p1) => { extractedJs += p1 + '\n'; return ''; });
    active.html = htmlCode.trim();
    if (pageEditorInstance) pageEditorInstance.setValue(active.html);
    if (extractedCss.trim() && cssEditorInstance) {
      let currentCss = cssEditorInstance.getValue();
      cssEditorInstance.setValue((currentCss + '\n' + extractedCss).trim());
    }
    if (extractedJs.trim() && jsEditorInstance) {
      let currentJs = jsEditorInstance.getValue();
      jsEditorInstance.setValue((currentJs + '\n' + extractedJs).trim());
    }
    triggerPreview();
    updateTabUI();
  }
  
  function mergeCode() {
    const active = htmlTabs.find(t => t.id === activeTabId);
    if (!active) return;
    let currentHtml = active.html;
    const cssContent = cssEditorInstance ? cssEditorInstance.getValue().trim() : '';
    const jsContent = jsEditorInstance ? jsEditorInstance.getValue().trim() : '';
    let merged = currentHtml;
    if (cssContent) {
      const styleTag = `<style data-merged="true">\n${cssContent}\n</style>`;
      if (merged.toLowerCase().includes('</head>')) merged = merged.replace(/<\/head>/i, styleTag + '\n</head>');
      else if (merged.toLowerCase().includes('<body')) merged = merged.replace(/<body/i, styleTag + '\n<body');
      else merged = styleTag + '\n' + merged;
    }
    if (jsContent) {
      const scriptTag = `<script data-merged="true">\n${jsContent}\n<\/script>`;
      if (merged.toLowerCase().includes('</body>')) merged = merged.replace(/<\/body>/i, scriptTag + '\n</body>');
      else merged = merged + scriptTag;
    }
    active.html = merged;
    if (pageEditorInstance) pageEditorInstance.setValue(active.html);
    if (cssEditorInstance) cssEditorInstance.setValue('');
    if (jsEditorInstance) jsEditorInstance.setValue('');
    triggerPreview();
    updateTabUI();
  }
  
  // Panel toggle
  let isPanelCollapsed = false;
  function toggleCodePanel() {
    isPanelCollapsed = !isPanelCollapsed;
    if (isPanelCollapsed) {
      editorPanel.classList.add('collapsed');
      arrowIcon.textContent = '▲';
      toggleTextSpan.textContent = 'Show Code Panel';
      document.getElementById('handleIcon').textContent = '▼';
    } else {
      editorPanel.classList.remove('collapsed');
      arrowIcon.textContent = '▼';
      toggleTextSpan.textContent = 'Hide Code Panel';
      document.getElementById('handleIcon').textContent = '▲';
    }
    setTimeout(() => { if (pageEditorInstance) pageEditorInstance.refresh(); }, 80);
  }
  
  function init() {
    buildEditors();
    // default tabs
    htmlTabs.push({ id: 1, name: "home", html: `<div style="padding:2rem; max-width:800px; margin:0 auto;"><h1>CodeCanvas Pro</h1><p>Real-time editing with horizontal scroll, search & replace, undo/redo. Preview any device.</p><button onclick="alert('JS works!')">Test JS</button><div style="height:200px;"></div><footer>Scroll works seamlessly</footer></div>` });
    activeTabId = 1;
    tabCounter = 1;
    if (pageEditorInstance) pageEditorInstance.setValue(htmlTabs[0].html);
    // set default sample base
    if (baseEditorInstance) baseEditorInstance.setValue(`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Live Preview</title></head><body></body></html>`);
    if (cssEditorInstance) cssEditorInstance.setValue(`body { font-family: system-ui; margin: 0; background: #fff; }\nbutton { background: #2c6eef; color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; }`);
    if (jsEditorInstance) jsEditorInstance.setValue(`console.log("Global JS ready"); document.body?.addEventListener('click',(e)=>console.log(e.target));`);
    triggerPreview();
    updateTabUI();
    
    // device buttons
    document.querySelectorAll('.device-btn').forEach(btn => {
      btn.addEventListener('click', (e) => setPreview(btn.dataset.device));
    });
    document.getElementById('backBtn').addEventListener('click', () => alert("Dashboard simulation — all features active."));
    togglePanelBtn.addEventListener('click', toggleCodePanel);
    panelHandle.addEventListener('click', toggleCodePanel);
    detectAndSetDefaultDevice();
    window.addEventListener('resize', () => { /* optional but keep device btn active unchanged */ });
  }
  
  init();
</script>
</body>
</html>
